<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    width:1080px;height:1080px;overflow:hidden;
    font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;
    background:#121826;position:relative;
  }
  .accent-bar{
    position:absolute;top:0;left:0;right:0;height:8px;
    background:linear-gradient(90deg,#00D4AA,#00A8E8);
  }
  .glow-1{
    position:absolute;top:-180px;left:-120px;
    width:400px;height:400px;border-radius:50%;
    background:radial-gradient(circle,rgba(0,168,232,0.08),transparent 70%);
  }
  .brand{
    position:absolute;bottom:28px;left:48px;
    font-size:12px;font-weight:700;color:rgba(255,255,255,0.15);
    letter-spacing:2px;
  }
  .brand span{color:#00D4AA}
  .content{
    position:absolute;top:60px;left:0;right:0;bottom:70px;
    padding:0 48px;display:flex;flex-direction:column;
  }
  .eyebrow{
    font-size:12px;font-weight:700;color:#00D4AA;
    letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;
  }
  h2{
    font-size:30px;font-weight:700;color:#FFFFFF;line-height:1.2;
    margin-bottom:16px;
  }
  h2 span{color:#00D4AA}
  .screenshot-wrapper{
    flex:1;display:flex;align-items:center;justify-content:center;
    min-height:0;
  }
  .screenshot-wrapper img{
    max-width:100%;max-height:100%;border-radius:12px;
    box-shadow:0 8px 40px rgba(0,0,0,0.4);
  }
  .caption{
    text-align:center;margin-top:16px;
    font-size:14px;color:rgba(255,255,255,0.5);
  }
  .page-indicator{
    position:absolute;bottom:28px;right:48px;
    display:flex;gap:8px;align-items:center;
  }
  .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.15)}
  .dot.active{background:#00D4AA;width:24px;border-radius:4px}
</style>
</head>
<body>
<div class="accent-bar"></div>
<div class="glow-1"></div>

<div class="content">
  <div class="eyebrow">🌙 Dark Mode</div>
  <h2>Easy on the eyes, <span>day or night</span></h2>
  
  <div class="screenshot-wrapper">
    <img src="file:///Users/jayvg/Desktop/Hermes/Tools/bilang/post-assets/bilang-dark.png" alt="Bilang dark mode">
  </div>
  
  <div class="caption">Switch between light and dark mode — perfect for late-night work sessions</div>
</div>

<div class="brand">JT · <span>JAYTECH</span> TIPS</div>
<div class="page-indicator">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>
</body>
</html>
